name: Python CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort
        pip install -r requirements.txt

    - name: Lint with flake8
      run: |
        # Stop build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Check formatting with black
      run: |
        black --check . || true

    - name: Check imports with isort
      run: |
        isort --check-only . || true

    - name: Test imports
      run: |
        python -c "from src.engine import ScreeningEngine; print('Engine OK')"
        python -c "from src.adaptive_rl import get_optimizer; print('RL OK')"
        python -c "from src.enhanced_data import get_enhanced_data; print('Enhanced Data OK')"
        python -c "import api; print('API OK')"

    - name: Test database initialization
      run: |
        python -c "
from src.database import ScreenerDB
import tempfile
import os
with tempfile.TemporaryDirectory() as tmp:
    db = ScreenerDB(os.path.join(tmp, 'test.db'))
    print('Database OK')
"

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
    - uses: actions/checkout@v4

    - name: Create deployment package
      run: |
        mkdir -p deployment
        cp -r src static data requirements.txt api.py main.py config.yaml run.sh start.sh screen_once.py README.md DEPLOYMENT.md deployment/
        mkdir -p deployment/data
        tar -czf coin-screener-pro.tar.gz deployment/

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: coin-screener-pro
        path: coin-screener-pro.tar.gz
        retention-days: 30

    - name: Create Release
      if: contains(github.event.head_commit.message, 'release:') || contains(github.event.head_commit.message, 'deploy:')
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ github.run_number }}
        release_name: Release v${{ github.run_number }}
        body: |
          Automated release from commit ${{ github.sha }}
          
          Changes:
          ${{ github.event.head_commit.message }}
          
          ## Deployment
          Download `coin-screener-pro.tar.gz` and extract to your VPS:
          ```bash
          tar -xzf coin-screener-pro.tar.gz
          cd deployment
          ./start.sh
          ```
        draft: false
        prerelease: false
